    <!-- 🔐 PROTEÇÃO DE AUTENTICAÇÃO -->
    <script>
        // Verificar se está logado ANTES de carregar a página
        const SESSION_EXPIRATION = 8 * 60 * 60 * 1000; // 8 horas
        let user = null;
        try {
            user = JSON.parse(localStorage.getItem('user') || '{}');
        } catch (e) {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
        
        if (!user || !user.email || !(user.authToken || user.token)) {
            // Não está logado - redirecionar para login
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        } else {
            // Verificar se sessão expirou
            const loginAt = user.loginAt || 0;
            if (Date.now() - loginAt > SESSION_EXPIRATION) {
                // Sessão expirada - limpar e redirecionar
                localStorage.removeItem('user');
                window.location.href = 'login.html';
            }
        }
    </script>

    <!-- Sobrescrever função de logout para o novo sistema de autenticação -->
    <script>
        // Sobrescrever a função antiga do script.js
        window.fazerLogout = function() {
            const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxCK2_MelvUHTVvvGfvx0M9QfflATDhr4sZjH5nAVgE4kgfvdRo1pFaVGQGZjk_PG5rdg/exec';
            
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            // Registrar logout nos logs
            if (user.email) {
                fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        action: 'log',
                        email: user.email,
                        nickname: user.nickname,
                        evento: 'logout'
                    })
                }).catch(err => console.error('Erro ao registrar logout:', err));
            }
            
            // Limpar localStorage e sessionStorage
            localStorage.clear();
            sessionStorage.clear();
            
            // Redirecionar para login
            window.location.href = './login.html';
        };
    </script>
    
    <!-- Script para popular informações do usuário no header -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userStr = localStorage.getItem('user');
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    
                    // Popular informações do header
                    document.getElementById('userPhoto').src = user.foto || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.nickname) + '&background=667eea&color=fff';
                    document.getElementById('userName').textContent = user.nome || user.nickname;
                    document.getElementById('userRole').textContent = user.role === 'admin' ? 'ADMIN' : 'MEMBRO';
                    
                    // Mostrar link Admin se for admin
                    if (user.role === 'admin') {
                        document.getElementById('adminLink').style.display = 'block';
                        
                        const adminBtn = document.getElementById('adminBtn');
                        if (adminBtn) {
                            adminBtn.style.display = 'block';
                            adminBtn.addEventListener('click', function() {
                                window.location.href = './admin/admin.html';
                            });
                        }
                    }
                } catch (e) {
                    console.error('Erro ao carregar informações do usuário:', e);
                }
            }
        });
    </script>
