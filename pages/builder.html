<!DOCTYPE html>
<div class="builder-page">
  <header class="builder-header">
    <h1>Construtor de Movesets</h1>
    <p>Cole o bloco da Pokedex do jogo para gerar os golpes e TMs detectados.</p>
  </header>

  <section class="builder-top" style="display:flex;gap:16px;align-items:flex-start;">
    <div style="flex:0 0 300px;">
      <div id="smeargleCard" class="smeargle-card">
        <div class="smeargle-header">
            <div class="smeargle-number">#</div>
            <div class="smeargle-type-icon" id="smeargleTypeIcon"><i class="fas fa-circle"></i></div>
        </div>
        <div class="smeargle-img-container">
        <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" alt="Pokémon" class="smeargle-img">
      </div>
        <h3 class="smeargle-name">Build</h3>
        <div class="smeargle-type-badge" id="smeargleTypeBadge"><span class="type-badge type-normal">Tipo</span></div>

        <div class="smeargle-moves-selected" id="smeargleMovesSelected">
            <div class="moves-selected-title">
                <i class="fas fa-list"></i> Golpes Selecionados (<span id="movesCount">0</span>/9)
            </div>
            <div class="moves-selected-list" id="movesList">
                <div class="no-moves-yet">Nenhum golpe selecionado</div>
            </div>
        </div>

        <button class="btn-clear-moves" id="btnClearMoves"><i class="fas fa-trash"></i> Limpar Tudo</button>
      </div>
    </div>

    <div style="flex:1;">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;">
        <div style="display:flex;gap:8px;align-items:center;">
          <div id="tmCounter" style="padding:8px 12px;border-radius:8px;background:rgba(0,0,0,0.3);color:#fff;">TMs/MTs: <span id="tmCountVal">0</span></div>
          <div id="maxMoves" style="padding:6px 8px;border-radius:6px;background:rgba(0,0,0,0.15);color:#fff">Max Base Moves: <select id="selectMaxBaseMoves"><option>9</option><option selected>10</option></select></div>
        </div>
        <div style="flex:0 0 420px;text-align:center;">
          <button id="btnSubmitBuild" class="btn-submit">SUBMETER MOVESET</button>
        </div>
      </div>

      <div class="builder-main">
        <div style="margin-bottom:12px;">
          <textarea id="pokedexPaste" placeholder="Cole aqui o texto da Pokedex..." style="width:100%;height:160px;padding:8px;background:rgba(0,0,0,0.35);color:#fff;border-radius:8px;border:1px solid rgba(255,255,255,0.03);"></textarea>
          <div style="margin-top:8px;display:flex;gap:8px;">
            <button id="btnParsePokedex" class="btn-action">Parsear</button>
            <button id="btnClearPokedex" class="btn-action btn-alt">Limpar</button>
          </div>
        </div>

        <div style="display:flex;gap:12px;">
          <div style="flex:1;">
            <h3>Golpes detectados</h3>
            <!-- Combined single window: moves grid (style Smeargle) + TMs on right -->
            <div id="combinedPanel" style="display:flex;flex-direction:column;gap:12px;align-items:stretch;">
              <div style="width:100%;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.06));padding:10px;border-radius:12px;max-height:40vh;overflow:auto">
                <h4 style="margin-top:0;margin-bottom:8px">Golpes detectados</h4>
                <div id="combinedMovesGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px"></div>
              </div>
              <div style="width:100%;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.06));padding:10px;border-radius:12px;max-height:40vh;overflow:auto">
                <h4 style="margin-top:0;margin-bottom:8px">TMs e MTs</h4>
                <div id="combinedTmsGrid" style="display:grid;grid-template-columns:1fr;gap:12px"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Containers auxiliares para compatibilidade com funções Smeargle (mantidos ocultos) -->
  <div id="movesGrid" style="display:none"></div>
  <div id="compatibleGrid" style="display:none"></div>

  <!-- Modal combinado: golpes (esq) + TMs (dir) -->
  <div id="assignModal" style="display:none;position:fixed;right:24px;bottom:24px;width:880px;max-height:78vh;background:linear-gradient(180deg, rgba(10,10,10,0.95), rgba(20,20,20,0.95));border-radius:12px;padding:12px;box-shadow:0 30px 80px rgba(0,0,0,0.7);z-index:9999;overflow:auto;color:#fff">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div><strong id="assignTitle">Golpes e TMs</strong><div id="assignSubtitle" style="opacity:0.8;font-size:12px"></div></div>
      <div style="display:flex;gap:8px;align-items:center"><button id="assignClose" class="btn-action">Fechar</button></div>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-start">
      <div style="width:380px;background:rgba(255,255,255,0.02);padding:8px;border-radius:10px;max-height:60vh;overflow:auto">
        <div style="margin-bottom:6px;font-size:13px;opacity:0.9">Golpes detectados</div>
        <div id="assignMovesList"></div>
      </div>
      <div style="flex:1;background:rgba(255,255,255,0.02);padding:8px;border-radius:10px;max-height:60vh;overflow:auto">
        <div style="margin-bottom:6px;font-size:13px;opacity:0.9">TMs disponíveis</div>
        <div id="assignTmsGrid"></div>
      </div>
    </div>
    <div style="margin-top:10px;display:flex;justify-content:flex-end;gap:8px">
      <button id="assignSave" class="btn-action">Salvar atribuições</button>
    </div>
  </div>

  <style>
    .btn-submit{background:linear-gradient(135deg,#5b3fb8,#2b1f43);padding:12px 28px;border-radius:28px;border:none;color:#fff;font-weight:800;box-shadow:0 12px 36px rgba(44,27,70,0.45);}
    .btn-action{padding:8px 12px;border-radius:8px;border:none;background:#3a3a3a;color:#fff}
    .btn-alt{background:#555}
    .tm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
    .tm-tile{width:72px;height:72px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;color:#fff;font-weight:700}
    .tm-badge-top{position:absolute;left:8px;top:8px;background:rgba(0,0,0,0.35);padding:4px 6px;border-radius:8px;font-size:11px}
    .tm-number-badge{position:absolute;right:8px;top:8px;background:rgba(0,0,0,0.55);padding:3px 7px;border-radius:10px;font-size:11px}
    .tm-tile .tm-icon{width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.04);font-size:20px}
    .tm-tile .tm-title{font-size:11px;margin-top:6px;text-align:center}
    .tm-tile.selected{box-shadow:0 10px 40px rgba(65,184,131,0.18),0 0 20px rgba(65,184,131,0.18);transform:translateY(-6px)}
      /* Unified TM panel: hide legacy/duplicate TM containers to show a single TM window */
      #builderTmsList, #assignTmsGrid, #assignTmsGridInline { display: none !important; }
    .parsed-move-item{display:flex;justify-content:space-between;align-items:center;padding:6px;border-bottom:1px solid rgba(255,255,255,0.03)}
    .assigned-slot{background:rgba(255,255,255,0.05);padding:2px 6px;border-radius:6px;margin-left:8px;font-size:13px;color:#ffd966}
    /* modal moves list */
    #assignMovesList .modal-move-item{border-bottom:1px solid rgba(255,255,255,0.03)}
    #assignMovesList .modal-move-item{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.06));padding:10px;border-radius:10px}
    #assignMovesList .modal-move-item strong{display:block;margin-bottom:6px}
    #assignMovesList .modal-move-item .assigned-slot{background:rgba(255,255,255,0.06);padding:4px 8px;border-radius:10px;color:#ffd966;font-weight:700}
    #assignTmsGrid .tm-grid{display:grid;grid-template-columns:repeat(auto-fill,84px);gap:12px;align-items:start}
    #assignTmsGrid .tm-tile{width:84px;height:84px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(0,0,0,0.12));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.02)}
    #assignTmsGrid .tm-tile .tm-icon{width:48px;height:48px;border-radius:10px;background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;font-size:20px}
    #assignTmsGrid .tm-tile .tm-title{font-size:11px;margin-top:6px;text-align:center}
    #assignTmsGrid .tm-tile .tm-badge-top{left:6px;top:6px;font-size:10px;padding:3px 5px}
    #assignTmsGrid .tm-tile .tm-number-badge{right:6px;top:6px;font-size:10px;padding:3px 6px}
    #assignTmsGrid .tm-tile.selected{box-shadow:0 8px 30px rgba(65,184,131,0.25),0 0 24px rgba(65,184,131,0.24);transform:translateY(-6px);border:2px solid rgba(65,184,131,0.25)}
    /* Style combined TMs as a grid of Smeargle-like cards */
    #combinedTmsGrid{display:block}
    /* the JS injects an inner .tm-grid — style it as the same responsive card grid used for detected moves */
    #combinedTmsGrid .tm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
    /* make each TM tile match the visual size/spacing of move-card/builder-card */
    #combinedTmsGrid .tm-tile.move-card{position:relative;min-height:88px;padding:10px;border-radius:12px;background:transparent;border:none;display:flex;flex-direction:column;align-items:stretch;justify-content:flex-start;text-align:left;box-shadow:0 8px 22px rgba(0,0,0,0.35)}
    #combinedTmsGrid .tm-tile.move-card:hover{transform:translateY(-4px);box-shadow:0 14px 40px rgba(0,0,0,0.45)}
    #combinedTmsGrid .tm-tile.move-card .move-tipo-icon{font-size:1.6em;margin-bottom:8px;color:#ffd700}
    #combinedTmsGrid .tm-tile.move-card .move-name{font-weight:900;font-size:1.05em;margin-bottom:6px;color:#fff}
    #combinedTmsGrid .tm-tile.move-card .move-details{margin-bottom:6px}
    /* numeric badge as small circle at top-left (like Smeargle) */
    #combinedTmsGrid .tm-tile.move-card .tm-number-badge{position:absolute;left:10px;top:10px;width:36px;height:36px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.65);color:#fff;font-weight:800}
    /* hide legacy small top badge */
    #combinedTmsGrid .tm-tile.move-card .tm-badge-top{display:none}

    /* Override global small-tile sizing for builder-styled TM tiles so controls are visible */
    .tm-tile.builder-card {
      min-height:88px !important;
      min-width:140px !important;
      height: auto !important;
      width: 100% !important;
      box-sizing: border-box !important;
      padding:10px !important;
      display:flex !important;
      flex-direction:column !important;
      align-items:stretch !important;
      justify-content:flex-start !important;
      overflow:visible !important;
    }
    .tm-tile.builder-card .move-actions { display:flex !important; }
    .tm-tile.builder-card .move-name { white-space:normal !important; font-size:0.95em !important; }
    /* hide empty category pills to avoid blank circles */
    .move-details .move-categoria:empty { display:none !important; }

    /* Make TM tiles visually match builder-card moves */
    .tm-tile.builder-card { background: inherit; color: inherit; border-radius:12px; box-shadow:0 12px 30px rgba(0,0,0,0.45); padding:12px; }
    .tm-tile.builder-card .tm-number-badge { display: none !important; }
    .tm-tile.builder-card .slot-badge { display:inline-flex; margin-left:auto; background:rgba(255,255,255,0.12); padding:6px 8px; border-radius:999px; font-weight:800; color:#ffd966 }
    /* centralized styles for generated tile internals */
    .move-slot-origem{font-size:0.95em;color:#ffd700;margin-top:6px}
    .move-actions{margin-top:8px;display:flex;gap:8px;align-items:center}
    .move-actions select{padding:4px;border-radius:4px}
    .move-actions button{padding:6px 8px;border-radius:6px;border:none;background:#fff;color:#111;cursor:pointer}
    .move-actions button:focus{outline:3px solid rgba(255,255,255,0.12)}
    .move-name{white-space:normal}
    .tm-tile:focus{outline:3px solid rgba(65,184,131,0.18)}
    .tm-tile{transition:transform 0.18s ease, box-shadow 0.18s ease}

    /* Hide empty category pills and TM default pill visuals */
    .move-details .move-categoria:empty{display:none}

    /* responsive tweak: allow tighter grid on small screens */
    @media (max-width:600px){
      .tm-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
      .tm-tile.builder-card{min-width:120px}
      .builder-card .move-name{font-size:14px}
    }

    /* Smeargle-style move cards */
    .builder-card{border-radius:12px; padding:12px; color:#fff; box-shadow:0 12px 30px rgba(0,0,0,0.45); display:flex; flex-direction:column; justify-content:space-between; min-height:88px}
    .builder-card .move-name{font-weight:900; font-size:15px}
    .builder-card .move-sub{opacity:0.85; font-size:12px; margin-top:6px}
    .builder-card .move-actions{margin-top:10px; display:flex; gap:8px; align-items:center}

    /* color variants: basic mapping (fallbacks) */
    .builder-card.type-fire{background:linear-gradient(180deg,#ff6b4d,#ff944d)}
    .builder-card.type-water{background:linear-gradient(180deg,#4da6ff,#4dd0ff)}
    .builder-card.type-electric{background:linear-gradient(180deg,#ffea4d,#ffd54d); color:#1b1b1b}
    .builder-card.type-psychic{background:linear-gradient(180deg,#ff5fbf,#ff87d1)}
    .builder-card.type-dragon{background:linear-gradient(180deg,#66ccff,#66a3ff)}
    .builder-card.type-normal{background:linear-gradient(180deg,#bdbdbd,#9e9e9e); color:#111}
    .builder-card.type-steel{background:linear-gradient(180deg,#9fb0c8,#7f98b0)}
    .builder-card.type-ground{background:linear-gradient(180deg,#e89a4d,#d67a3a)}
    .builder-card.type-grass{background:linear-gradient(180deg,#7bd47b,#4dbd4d)}
    .builder-card.type-ghost{background:linear-gradient(180deg,#7b5aff,#5b3fb8)}

    /* small badge for slot */
    .builder-card .slot-badge{background:rgba(255,255,255,0.12);padding:6px 8px;border-radius:999px;font-weight:800;color:#ffd966}

    /* make TM tiles match move-card inner layout */
    #combinedTmsGrid .tm-tile .tm-left{display:flex;align-items:center;gap:12px}
    #combinedTmsGrid .tm-tile .tm-right{display:flex;align-items:center;gap:10px}
    /* Helpers for modal move items and inline lists */
    .modal-move-inner{display:flex;gap:10px;align-items:center}
    .modal-move-main{flex:1}
    .tm-icon{width:46px;height:46px;border-radius:8px;background:linear-gradient(135deg, rgba(255,255,255,0.03), rgba(0,0,0,0.08));display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;flex-shrink:0}
    .selected-move-highlight{outline:3px solid rgba(65,184,131,0.18)}
    .slot-badge{background:rgba(255,255,255,0.05);padding:6px 8px;border-radius:999px;font-weight:800;color:#ffd966}
  </style>
</div>
