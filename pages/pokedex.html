<div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 Digite para buscar Pokémon (nome, tipo, localização, EV, TMs)... • Separe com vírgula para buscar vários">
    <p class="search-hint">
        <i class="fas fa-lightbulb"></i> EV como nome principal • Tipos em PT/EN • Imagens do Pokémon Database
    </p>

    <!-- FILTROS AVANÇADOS -->
    <div class="pokedex-filters">
        <button class="pokedex-filter-toggle" id="toggleFilters" onclick="toggleFiltrosPokedex()">
            <i class="fas fa-filter"></i> Filtros Avançados
        </button>
        <div class="pokedex-filters-panel" id="filtersPanel" style="display:none;">
            <!-- Geração -->
            <div class="filter-group">
                <label class="filter-label"><i class="fas fa-layer-group"></i> Geração</label>
                <select id="filterGen" class="filter-select" onchange="aplicarFiltrosPokedex()">
                    <option value="">Todas</option>
                    <option value="1">Gen 1</option>
                    <option value="2">Gen 2</option>
                    <option value="3">Gen 3</option>
                    <option value="4">Gen 4</option>
                    <option value="5">Gen 5</option>
                    <option value="6">Gen 6</option>
                    <option value="7">Gen 7</option>
                    <option value="8">Gen 8</option>
                    <option value="9">Gen 9</option>
                </select>
            </div>

            <!-- Tipagem -->
            <div class="filter-group">
                <label class="filter-label"><i class="fas fa-fire"></i> Tipagem</label>
                <select id="filterType" class="filter-select" onchange="aplicarFiltrosPokedex()">
                    <option value="">Todas</option>
                    <option value="normal">Normal</option>
                    <option value="fire">Fire</option>
                    <option value="water">Water</option>
                    <option value="grass">Grass</option>
                    <option value="electric">Electric</option>
                    <option value="ice">Ice</option>
                    <option value="fighting">Fighting</option>
                    <option value="poison">Poison</option>
                    <option value="ground">Ground</option>
                    <option value="flying">Flying</option>
                    <option value="psychic">Psychic</option>
                    <option value="bug">Bug</option>
                    <option value="rock">Rock</option>
                    <option value="ghost">Ghost</option>
                    <option value="dragon">Dragon</option>
                    <option value="dark">Dark</option>
                    <option value="steel">Steel</option>
                    <option value="fairy">Fairy</option>
                </select>
            </div>

            <!-- Forma EV -->
            <div class="filter-group">
                <label class="filter-label"><i class="fas fa-dna"></i> Forma / EV</label>
                <select id="filterEV" class="filter-select" onchange="aplicarFiltrosPokedex()">
                    <option value="">Todas</option>
                    <option value="mega">Mega</option>
                    <option value="shiny">Shiny</option>
                    <option value="alolan">Alolan</option>
                    <option value="galarian">Galarian</option>
                    <option value="hisuian">Hisuian</option>
                    <option value="paldean">Paldean</option>
                    <option value="boss">Boss</option>
                    <option value="sem_ev">Sem EV (Base)</option>
                    <option value="com_ev">Com EV</option>
                </select>
            </div>

            <!-- Sugestões do Clã -->
            <div class="filter-group">
                <label class="filter-label"><i class="fas fa-lightbulb"></i> Sugestões do Clã</label>
                <select id="filterSugestao" class="filter-select" onchange="aplicarFiltrosPokedex()">
                    <option value="">Todos</option>
                    <option value="com_sugestao">Com Sugestões</option>
                    <option value="sem_sugestao">Sem Sugestões</option>
                </select>
            </div>

            <button class="filter-clear-btn" onclick="limparFiltrosPokedex()">
                <i class="fas fa-times"></i> Limpar Filtros
            </button>
        </div>
    </div>
</div>

<div id="pokemonContainer" class="pokemon-grid">
    <div class="loading">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Carregando dados da planilha...</p>
    </div>
</div>

<!-- Painel rápido: Colar Pokedex e Salvar -->
<div class="paste-save-panel">
    <h3>Colar Pokedex (Rápido)</h3>
    <textarea id="pokedexPasteQuick" placeholder="Cole o texto da Pokedex do jogo aqui" style="width:100%;min-height:120px;margin-bottom:8px"></textarea>
    <div style="display:flex;gap:8px;align-items:center">
        <button id="btnPasteSavePokedex" class="btn-save-pokedex"><i class="fas fa-save"></i> Colar e Salvar</button>
        <span id="pasteSaveStatus" style="color:#9bbcff;margin-left:8px"></span>
    </div>
</div>

<script>
    document.getElementById('btnPasteSavePokedex').addEventListener('click', async function(){
        const txt = document.getElementById('pokedexPasteQuick').value || '';
        if(!txt) return alert('Cole o texto da Pokedex primeiro');
        try{
            const parsed = (window.parsePokedexText) ? window.parsePokedexText(txt) : null;
            if(!parsed){ alert('Parser não disponível. Abra a aba Builder primeiro ou recarregue a página.'); return; }
            const name = parsed.meta && parsed.meta.nome ? parsed.meta.nome : (parsed.moves && parsed.moves[0] && parsed.moves[0].origem) || '';
            document.getElementById('pasteSaveStatus').textContent = 'Enviando...';
            await window.savePokedexMovesToSheet(name, parsed.moves || [], parsed.meta && parsed.meta.stats ? parsed.meta.stats : {});
            document.getElementById('pasteSaveStatus').textContent = 'Enviado ✓';
            setTimeout(()=>{ document.getElementById('pasteSaveStatus').textContent=''; }, 1800);
        }catch(e){ console.error('pasteSave error', e); alert('Erro ao salvar: ' + e.message); }
    });
</script>
