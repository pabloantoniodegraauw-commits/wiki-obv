<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Quests</title>
</head>
<body>
    <div class="container">
        <div class="tabs-nav">
            <button id="btnQuestsList" class="tab-btn active">
                <i class="fas fa-map-signs"></i> Quests
            </button>
            <button id="btnTasksList" class="tab-btn">
                <i class="fas fa-tasks"></i> Tasks
            </button>
        </div>

        <!-- ===== QUESTS PAGE ===== -->
        <div id="questsListPage" style="display:block;">
            <div class="tasks-header" style="text-align:center; margin-bottom:20px; padding:20px 0;">
                <h2 style="color:#ffd700; margin-bottom:10px;">
                    <i class="fas fa-map-signs"></i> Quests do PokeMemorias
                </h2>
                <p style="color:#a0e7ff; margin-bottom:15px;">Missoes especiais com recompensas exclusivas</p>

                <!-- Botao ADM adicionar quest (amarelo dourado) -->
                <div id="btnAdicionarQuestWrap" style="display:none; margin-bottom:15px;">
                    <button class="btn-copiar-loc"
                        style="background:rgba(255,215,0,0.2);border-color:rgba(255,215,0,0.5);color:#ffd700;font-weight:700;"
                        onclick="window.abrirModalAdicionarQuest()">
                        <i class="fas fa-plus"></i> Adicionar Quest
                    </button>
                </div>

                <!-- Barra de busca e filtros -->
                <div style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center; align-items:center; margin-bottom:10px;">
                    <input type="text" id="questSearchInput" placeholder="Buscar quest por nome..."
                        style="padding:8px 14px; border-radius:10px; border:1px solid rgba(0,212,255,0.3); background:rgba(15,20,40,0.8); color:#e0e8ff; min-width:220px;"
                        oninput="window.filtrarQuests()">
                    <select id="questFilterAcesso" onchange="window.filtrarQuests()"
                        style="padding:8px 12px; border-radius:10px; border:1px solid rgba(0,212,255,0.3); background:rgba(15,20,40,0.8); color:#e0e8ff;">
                        <option value="">Todos (Free/VIP)</option>
                        <option value="Free">Free</option>
                        <option value="VIP">VIP</option>
                    </select>
                    <select id="questFilterDificuldade" onchange="window.filtrarQuests()"
                        style="padding:8px 12px; border-radius:10px; border:1px solid rgba(0,212,255,0.3); background:rgba(15,20,40,0.8); color:#e0e8ff;">
                        <option value="">Todas Dificuldades</option>
                        <option value="1">Facil</option>
                        <option value="2">Medio</option>
                        <option value="3">Dificil</option>
                        <option value="4">Muito Dificil</option>
                        <option value="5">Extremo</option>
                    </select>
                    <button onclick="window.limparFiltrosQuests()" title="Limpar filtros"
                        style="padding:8px 12px; border-radius:10px; border:1px solid rgba(255,100,100,0.4); background:rgba(255,100,100,0.1); color:#ff8080; cursor:pointer;">
                        <i class="fas fa-times"></i> Limpar
                    </button>
                </div>
            </div>

            <div id="questsContainer" class="quests-grid">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Carregando Quests...</p>
                </div>
            </div>
        </div>

        <!-- ===== TASKS PAGE ===== -->
        <div id="tasksListPage" style="display:none;">
            <div class="tasks-header" style="text-align:center; margin-bottom:20px; padding:20px 0;">
                <h2 style="color:#ffd700; margin-bottom:10px;">
                    <i class="fas fa-scroll"></i> Tasks do NPC Lem
                </h2>
                <p style="color:#a0e7ff; margin-bottom:15px;">O NPC Lem oferece recompensas exclusivas a cada tarefa concluida no PVP</p>

                <!-- Botao ADM adicionar task (amarelo dourado) -->
                <div id="btnAdicionarTaskWrap" style="display:none; margin-bottom:15px;">
                    <button class="btn-copiar-loc"
                        style="background:rgba(255,215,0,0.2);border-color:rgba(255,215,0,0.5);color:#ffd700;font-weight:700;"
                        onclick="window.abrirModalAdicionarTask()">
                        <i class="fas fa-plus"></i> Adicionar Task
                    </button>
                </div>

                <!-- Barra de busca de tasks -->
                <div style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center; align-items:center; margin-bottom:10px;">
                    <input type="text" id="taskSearchInput" placeholder="Buscar task (pokemon, missao, ID)..."
                        style="padding:8px 14px; border-radius:10px; border:1px solid rgba(0,212,255,0.3); background:rgba(15,20,40,0.8); color:#e0e8ff; min-width:260px;"
                        oninput="window.filtrarTasks()">
                    <button onclick="window.limparFiltroTasks()" title="Limpar busca"
                        style="padding:8px 12px; border-radius:10px; border:1px solid rgba(255,100,100,0.4); background:rgba(255,100,100,0.1); color:#ff8080; cursor:pointer;">
                        <i class="fas fa-times"></i> Limpar
                    </button>
                </div>
            </div>

            <div id="tasksContainer" class="tasks-grid">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Carregando Tasks...</p>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
